<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gênesis — Login</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root { --primary:#0d1f3c; --primary-light:#1c3a72; --accent:#c8920a; --bg:#f7f9fc; --border:#e8edf5; --muted:#7081a0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-bg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(145deg, #0d1f3c 0%, #122744 45%, #0a1628 100%);
    }
    .login-bg-dots {
      position: fixed; inset: 0; z-index: 0;
      background-image: radial-gradient(rgba(200,146,10,.12) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .login-wrap { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 24px; }

    /* Logo */
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo-icon { display: inline-block; margin-bottom: 16px; filter: drop-shadow(0 4px 24px rgba(200,146,10,.35)); }
    .login-logo h1 { font-size: 28px; font-weight: 700; color: white; letter-spacing: 5px; line-height: 1; font-family: 'Orbitron', sans-serif; text-transform: uppercase; }
    .login-logo h1 .accent { color: #c8920a; }
    .login-logo p { font-size: 12px; color: rgba(255,255,255,.45); margin-top: 6px; letter-spacing: .5px; text-transform: uppercase; }

    /* Card */
    .login-card {
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 8px 40px rgba(0,0,0,.35), 0 1px 0 rgba(255,255,255,.6) inset;
      border: 1px solid rgba(255,255,255,.2);
    }
    .login-title { font-size: 17px; font-weight: 800; color: var(--primary); margin-bottom: 24px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    .field label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
    .field input {
      padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; outline: none; transition: border-color .2s, box-shadow .2s;
      background: #fafbff;
      font-family: inherit;
    }
    .field input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13,31,60,.08); background: white; }
    .btn-login {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #0d1f3c 0%, #122744 100%);
      color: white; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 800; cursor: pointer;
      transition: all .2s; margin-top: 4px;
      letter-spacing: .2px;
      box-shadow: 0 4px 16px rgba(13,31,60,.35);
      font-family: inherit;
    }
    .btn-login:hover { box-shadow: 0 6px 20px rgba(13,31,60,.5); transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .login-error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; line-height: 1.5; }
    .login-error.warn { background: #fffbeb; border-color: #fcd34d; color: #92400e; }
    .login-footer { text-align: center; margin-top: 20px; font-size: 11px; color: rgba(255,255,255,.3); letter-spacing: .3px; }
    .btn-login:disabled { opacity: .65; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .geo-notice {
      display: none; align-items: center; gap: 10px;
      background: rgba(200,146,10,.12); border: 1px solid rgba(200,146,10,.35);
      color: #78350f; border-radius: 8px; padding: 10px 14px;
      font-size: 12px; font-weight: 600; margin-bottom: 16px;
    }
    .geo-notice.show { display: flex; }
    .geo-spinner {
      width: 16px; height: 16px; flex-shrink: 0;
      border: 2px solid rgba(200,146,10,.3); border-top-color: #c8920a;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-bg"></div>
  <div class="login-bg-dots"></div>

  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-icon">
        <img src="public/img/logonomarcaGenesisDivino.svg" alt="Gênesis" style="height:110px;width:auto" />
      </div>
      <h1>Gênesis</h1>
      <p>[Nome da Empresa]</p>
    </div>

    <div class="login-card">
      <div class="login-title">Entrar no sistema</div>
      <div class="login-error" id="loginError"></div>
      <div class="geo-notice" id="geoNotice">
        <div class="geo-spinner"></div>
        <span id="geoNoticeText">Aguardando permissão de localização…</span>
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="loginSenha" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()" />
      </div>
      <button class="btn-login" id="btnLogin" onclick="doLogin()">Entrar</button>
    </div>
    <div class="login-footer">genesis.waycapital.com</div>
  </div>

  <script>
    // ── URL base da API (ajuste se o backend estiver em outra porta) ────────
    // Em produção com nginx: proxy_pass /api/ → http://localhost:3001/api/
    const API_BASE = window.GENESIS_API_BASE || '/api';

    // ── Redireciona se já autenticado ────────────────────────────────────────
    (function () {
      const a = JSON.parse(localStorage.getItem('crm_auth') || 'null');
      if (a && a.token && a.expiresAt && a.expiresAt > Date.now()) {
        window.location.href = 'crm.html';
      }
    })();

    // ── Helpers de UI ────────────────────────────────────────────────────────
    function showError(msg, isWarn = false) {
      const el = document.getElementById('loginError');
      el.textContent = msg;
      el.className = 'login-error' + (isWarn ? ' warn' : '');
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('loginError').style.display = 'none';
    }

    function setGeoNotice(text, show = true) {
      const el = document.getElementById('geoNotice');
      document.getElementById('geoNoticeText').textContent = text;
      el.classList.toggle('show', show);
    }

    function setLoading(loading, label = 'Entrando…') {
      const btn = document.getElementById('btnLogin');
      btn.disabled = loading;
      btn.textContent = loading ? label : 'Entrar';
    }

    // ── Coleta de geolocalização via GPS ─────────────────────────────────────
    function getGPSCoords() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error('UNSUPPORTED'));
          return;
        }
        navigator.geolocation.getCurrentPosition(
          pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
          err => {
            if (err.code === err.PERMISSION_DENIED) reject(new Error('DENIED'));
            else if (err.code === err.TIMEOUT)      reject(new Error('TIMEOUT'));
            else                                    reject(new Error('UNAVAILABLE'));
          },
          { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
      });
    }

    // ── Fluxo principal de login ─────────────────────────────────────────────
    async function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const senha = document.getElementById('loginSenha').value;

      hideError();

      if (!email || !senha) {
        showError('Preencha e-mail e senha.');
        return;
      }

      // ── MODO DEMO: login offline com credenciais demo/demo ──────────────
      if (email === 'demo@genesis.com' && senha === 'demo') {
        localStorage.setItem('crm_auth', JSON.stringify({
          token:     'demo-token',
          nome:      'Usuário Demo',
          email:     'demo@genesis.com',
          papel:     'admin',
          expiresAt: Date.now() + 8 * 3600 * 1000,
        }));
        sessionStorage.setItem('crm_session_alive', '1');
        window.location.href = 'crm.html';
        return;
      }

      setLoading(true, 'Obtendo localização…');

      // 1 — Solicitar localização GPS (preferencial, mas não obrigatório)
      let coords = { lat: null, lon: null };
      try {
        setGeoNotice('Aguardando permissão de localização…');
        coords = await getGPSCoords();
        setGeoNotice('Localização confirmada. Verificando acesso…');
      } catch (geoErr) {
        // GPS indisponível: prossegue sem coordenadas (backend validará por IP)
        setGeoNotice('Verificando acesso pela rede…');
      }

      // 2 — Enviar credenciais + GPS para o backend
      try {
        setLoading(true, 'Verificando…');

        const response = await fetch(`${API_BASE}/auth/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha, lat: coords.lat, lon: coords.lon }),
        });

        setGeoNotice('', false);

        const data = await response.json().catch(() => ({}));

        if (response.status === 403) {
          // Bloqueio geográfico ou falta de permissão
          showError(data.message || 'Acesso negado por restrição geográfica.');
          setLoading(false);
          return;
        }

        if (response.status === 401) {
          showError('E-mail ou senha incorretos.');
          setLoading(false);
          return;
        }

        if (!response.ok) {
          showError(data.message || 'Erro ao conectar ao servidor. Tente novamente.');
          setLoading(false);
          return;
        }

        // 3 — Sucesso: armazenar token e redirecionar
        localStorage.setItem('crm_auth', JSON.stringify({
          token:     data.token,
          nome:      data.usuario.nome,
          email:     data.usuario.email,
          papel:     data.usuario.papel,
          expiresAt: Date.now() + 8 * 3600 * 1000,
        }));
        // Marca sessão ativa no sessionStorage (limpo ao fechar o browser/aba)
        sessionStorage.setItem('crm_session_alive', '1');

        window.location.href = 'crm.html';

      } catch (netErr) {
        // Backend inacessível — fallback seguro: bloqueia acesso
        setGeoNotice('', false);
        setLoading(false);
        showError(
          'Não foi possível conectar ao servidor de autenticação. Verifique sua conexão.',
          true
        );
      }
    }
  </script>
  <script src="public/js/version.js"></script>
  <script src="public/js/app-footer.js"></script>
</body>
</html>
